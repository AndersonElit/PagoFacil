apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pagofacil-prod
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # -- services managed by scaffold --
          # Las entradas se añaden automáticamente al correr maven_hexagonal_scaffold.py.
          # repoURL apunta a Gitea en floci-net (http://gitea:3000); ArgoCD llega a él
          # porque el cluster K3d (donde corre k3s) está en la misma red floci-net.
  template:
    metadata:
      name: '{{.service}}-prod'
    spec:
      project: pagofacil
      source:
        repoURL: '{{.repoURL}}'
        targetRevision: '{{.revision}}'
        path: 'helm/{{.service}}'
        helm:
          valueFiles:
            - 'values-prod.yaml'
      destination:
        server: https://kubernetes.default.svc
        namespace: prod
      # prod: SIN automated → sync MANUAL desde la UI de ArgoCD (gate de release).
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
