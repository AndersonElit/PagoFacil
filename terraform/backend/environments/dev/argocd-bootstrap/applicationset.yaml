apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pagofacil-dev
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # -- services managed by scaffold --
          - service: pagofacil-web
            repoURL: http://192.168.122.4:3000/pagofacil/pagofacil-web.git
            revision: main
          - service: report-processing-service
            repoURL: http://192.168.122.4:3000/pagofacil/report-processing-service.git
            revision: main
          - service: report-extraction-service
            repoURL: http://192.168.122.4:3000/pagofacil/report-extraction-service.git
            revision: main
          - service: integration-service
            repoURL: http://192.168.122.4:3000/pagofacil/integration-service.git
            revision: main
          - service: reporting-projection-service
            repoURL: http://192.168.122.4:3000/pagofacil/reporting-projection-service.git
            revision: main
          - service: audit-service
            repoURL: http://192.168.122.4:3000/pagofacil/audit-service.git
            revision: main
          - service: notification-service
            repoURL: http://192.168.122.4:3000/pagofacil/notification-service.git
            revision: main
          - service: fraud-compliance-service
            repoURL: http://192.168.122.4:3000/pagofacil/fraud-compliance-service.git
            revision: main
          - service: wallet-service
            repoURL: http://192.168.122.4:3000/pagofacil/wallet-service.git
            revision: main
          - service: identity-service
            repoURL: http://192.168.122.4:3000/pagofacil/identity-service.git
            revision: main
          # repoURL apunta a Gitea en floci-net (http://gitea:3000); ArgoCD (pod en
          # el cluster K3d pagofacil-dev) lo alcanza porque está en la misma red floci-net.
  template:
    metadata:
      name: '{{.service}}-dev'
    spec:
      project: pagofacil
      source:
        repoURL: '{{.repoURL}}'
        targetRevision: '{{.revision}}'
        path: 'helm/{{.service}}'
        helm:
          valueFiles:
            - 'values-dev.yaml'
      destination:
        server: https://kubernetes.default.svc
        namespace: dev
      # dev: auto-sync con prune + selfHeal (corrige drift automáticamente).
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
