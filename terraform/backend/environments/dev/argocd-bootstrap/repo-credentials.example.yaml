# Credenciales de repositorio para ArgoCD. ArgoCD (pod en el cluster K3d
# pagofacil-dev) alcanza Gitea por http://gitea:3000 porque ambos están en floci-net.
# Aplicar con: kubectl apply -f repo-credentials.example.yaml
apiVersion: v1
kind: Secret
metadata:
  name: repo-creds-gitea-pagofacil
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repo-creds
stringData:
  type: git
  url: http://gitea:3000/pagofacil
  username: gitea-admin
  password: gitea-admin
